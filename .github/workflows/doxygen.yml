name: Doxygenize Action
on:
  push:
    branches:
      - master
  workflow_dispatch:

# Bu satırı ekleyerek tüm sistemi Node.js 24'e geçmeye zorluyoruz:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - name: Doxygenize
        uses: langroodi/doxygenize@v1.7.1
        with:
          doxygenconf: './Doxyfile'
          htmloutput: './docs'
          ghpagesdir: './docs/'
          darkmode: 'true'
